<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Dicee</title>

    <link rel="stylesheet" href="diceRoll.css" />

    <link
      href="https://fonts.googleapis.com/css?family=Indie+Flower|Lobster"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <h1>Click Play</h1>

      <div class="dice">
        <p>Player 1</p>
        <img class="img1" src="./images/dice6.png" alt="diceimg" />
      </div>

      <div class="dice">
        <p>Player 2</p>
        <img class="img2" src="./images/dice6.png" alt="diceimg" />
      </div>

      <div class="btn-container">
        <button class="playBtn">🎲 Play Game</button>
      </div>
    </div>

    <footer>Made by 🎲 Shashwat 🎲 </footer>

    <script src="diceRoll.js" charset="utf-8"></script>
  </body>
</html>
